<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        const viewport = document.getElementById('viewport-meta');
        const setViewport = () => {
          const width = (window.outerWidth > 0) ? window.outerWidth : screen.width;
          if (width < 640) {
            // Force 640px viewport to trigger browser-side scaling
            viewport.setAttribute('content', 'width=640, user-scalable=yes');
          } else {
            // Standard behavior for tablets (768px) and desktop (1024px)
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0');
          }
        };
        setViewport();
        window.addEventListener('resize', setViewport);
      })();
    </script>
    <title>VC83</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
